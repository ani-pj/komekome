<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KomeKome</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
:root{
  --y:#ffff00; --y2:rgba(255,255,0,.55); --y3:rgba(255,255,0,.18);
  --y4:rgba(255,255,0,.07); --bg:#060606; --gr:rgba(255,255,0,.05);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:#fff;font-family:'Noto Sans JP',sans-serif;
  height:100vh;overflow:hidden;display:flex;flex-direction:column;
  background-image:
    linear-gradient(var(--gr) 1px,transparent 1px),
    linear-gradient(90deg,var(--gr) 1px,transparent 1px);
  background-size:28px 28px;
}
.cdeco{position:fixed;width:22px;height:22px;border-color:var(--y);border-style:solid;opacity:.5;z-index:9;pointer-events:none;}
.cdeco.tl{top:4px;left:4px;border-width:2px 0 0 2px;}.cdeco.tr{top:4px;right:4px;border-width:2px 2px 0 0;}
.cdeco.bl{bottom:4px;left:4px;border-width:0 0 2px 2px;}.cdeco.br{bottom:4px;right:4px;border-width:0 2px 2px 0;}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid var(--y);flex-shrink:0;}
.live-badge{background:var(--y);color:#000;font-weight:900;font-size:13px;padding:2px 10px;letter-spacing:3px;animation:lp 1s infinite;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.45}}
#hdr-title{font-size:13px;font-weight:900;letter-spacing:4px;color:var(--y);text-transform:uppercase;flex:1;}
.btn{background:transparent;border:1px solid var(--y);color:var(--y);padding:5px 14px;font-size:11px;font-family:inherit;cursor:pointer;letter-spacing:1px;transition:all .15s;white-space:nowrap;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
.btn:hover,.btn.on{background:var(--y);color:#000;}
.btn:disabled{opacity:.3;cursor:default;pointer-events:none;}
.btn.red{border-color:#f55;color:#f55;}.btn.red:hover{background:#f55;color:#fff;}
.btn.grn{border-color:#0f0;color:#0f0;}.btn.grn:hover,.btn.grn.on{background:#0f0;color:#000;}

/* ── BODY ── */
#body{display:flex;flex:1;overflow:hidden;}

/* ── LEFT FEED ── */
#feed{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--y);overflow:hidden;}
#feed-hdr{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid var(--y3);font-size:10px;letter-spacing:3px;color:var(--y2);flex-shrink:0;}
.dot{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0;}
.dot.on{background:var(--y);animation:dp .5s infinite;}
.dot.err{background:#f55;}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.1}}
#clist{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px;}
#clist::-webkit-scrollbar{width:3px;}#clist::-webkit-scrollbar-thumb{background:var(--y);}
.card{background:var(--y4);border:1px solid var(--y3);padding:9px 12px 9px 16px;position:relative;animation:ci .28s ease forwards;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));}
@keyframes ci{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.card::before{content:'';position:absolute;left:0;top:0;width:3px;height:100%;background:var(--y);}
.card.fresh{border-color:var(--y);background:rgba(255,255,0,.09);box-shadow:0 0 12px rgba(255,255,0,.14);}
.card.superchat{border-color:#f55;background:rgba(255,80,80,.08);}.card.superchat::before{background:#f55;}
.card-user{font-size:11px;font-weight:700;color:var(--y);letter-spacing:1px;margin-bottom:3px;}
.card.superchat .card-user{color:#f88;}
.card-body{font-size:13px;color:#eee;line-height:1.55;word-break:break-all;}
.card-ts{font-size:9px;color:rgba(255,255,0,.3);margin-top:4px;text-align:right;}
#empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:rgba(255,255,0,.2);text-align:center;height:100%;padding:30px;}
#empty .big{font-size:38px;}
#empty .sub{font-size:12px;letter-spacing:3px;text-transform:uppercase;}
#empty .desc{font-size:11px;color:rgba(255,255,0,.13);letter-spacing:1px;line-height:2.4;}

/* ── RIGHT PANEL ── */
#right{width:380px;display:flex;flex-direction:column;overflow:hidden;}

/* 入力セクション */
#input-section{border-bottom:1px solid var(--y);padding:12px;flex-shrink:0;}
.sec-lbl{font-size:10px;letter-spacing:3px;color:var(--y2);margin-bottom:8px;}

/* モード切り替え */
#mode-tabs{display:flex;gap:6px;margin-bottom:10px;}
.tab{flex:1;background:transparent;border:1px solid var(--y3);color:rgba(255,255,0,.4);padding:5px;font-size:11px;font-family:inherit;cursor:pointer;letter-spacing:1px;transition:all .15s;text-align:center;}
.tab.active{background:var(--y);color:#000;border-color:var(--y);font-weight:700;}

/* 入力フィールド */
.field{margin-bottom:8px;}
.field label{font-size:10px;color:var(--y2);letter-spacing:2px;display:block;margin-bottom:4px;}
.field input{
  width:100%;background:#0d0d0d;border:1px solid var(--y3);
  color:#fff;padding:7px 10px;font-size:12px;font-family:inherit;
  outline:none;transition:border-color .15s;
}
.field input:focus{border-color:var(--y);}
.field input::placeholder{color:rgba(255,255,0,.2);}

#api-key-field{display:none;}

/* コントロールボタン行 */
#ctrl-row{display:flex;gap:6px;}

/* エラー表示 */
#err-box{
  margin-top:8px;padding:7px 10px;background:rgba(255,80,80,.08);
  border:1px solid #f55;font-size:11px;color:#f88;
  display:none;line-height:1.6;
}

/* ステータス */
#status-section{padding:8px 12px;border-bottom:1px solid var(--y3);flex-shrink:0;}
#status-title{font-size:11px;color:rgba(255,255,0,.7);letter-spacing:1px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#status-bar{display:flex;gap:6px;font-size:10px;}
.stat-chip{background:var(--y4);border:1px solid var(--y3);padding:3px 8px;color:var(--y2);}

/* 統計 */
#stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:8px 12px;border-bottom:1px solid var(--y3);flex-shrink:0;}
.sbox{background:var(--y4);border:1px solid var(--y3);padding:7px;text-align:center;}
.snum{font-size:18px;font-weight:900;color:var(--y);}
.slbl{font-size:9px;color:rgba(255,255,0,.4);letter-spacing:1px;}

/* 来場者一覧 */
#visitors-wrap{height:180px;display:flex;flex-direction:column;border-bottom:1px solid var(--y3);padding:8px 12px;flex-shrink:0;}
#visitors-hdr{font-size:10px;letter-spacing:2px;color:var(--y2);margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
#visitors-count{color:var(--y);font-weight:700;}
#visitors-list{flex:1;overflow-y:auto;display:flex;flex-wrap:wrap;align-content:flex-start;gap:4px;}
#visitors-list::-webkit-scrollbar{width:3px;}#visitors-list::-webkit-scrollbar-thumb{background:rgba(255,255,0,.3);}
.visitor-chip{
  background:var(--y4);border:1px solid var(--y3);
  color:rgba(255,255,0,.75);font-size:10px;padding:2px 8px;
  white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis;
  animation:ci .25s ease forwards;
}
.visitor-chip.new-visitor{border-color:var(--y);color:var(--y);box-shadow:0 0 8px rgba(255,255,0,.2);animation:ci .25s ease forwards, vfade 2s ease 0.5s forwards;}
@keyframes vfade{to{border-color:var(--y3);color:rgba(255,255,0,.75);box-shadow:none;}}

/* ログ */
#log-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:8px 12px;}
#log-hdr{font-size:10px;letter-spacing:2px;color:var(--y2);margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
#log-area{flex:1;background:#040404;border:1px solid var(--y3);color:rgba(255,255,0,.6);font-size:10px;font-family:'Courier New',monospace;padding:7px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.7;resize:none;}
#log-area::-webkit-scrollbar{width:3px;}#log-area::-webkit-scrollbar-thumb{background:rgba(255,255,0,.3);}

/* ボトムバー */
#bottom-bar{padding:5px 14px;border-top:1px solid var(--y3);font-size:10px;letter-spacing:1px;flex-shrink:0;display:flex;align-items:center;gap:8px;}
#bottom-dot{width:7px;height:7px;border-radius:50%;background:#333;}
#bottom-dot.on{background:#0f0;animation:dp .8s infinite;}
#bottom-dot.err{background:#f55;}
#bottom-txt{color:rgba(255,255,0,.5);}

#sline{position:fixed;left:0;right:0;height:2px;pointer-events:none;z-index:998;background:linear-gradient(90deg,transparent,var(--y),transparent);opacity:0;}
#sline.go{animation:sl .7s ease-out forwards;}
@keyframes sl{0%{top:0;opacity:.8}100%{top:100vh;opacity:0}}

/* インストール案内 */
#install-box{
  margin-top:8px;padding:8px 10px;
  background:rgba(255,255,0,.04);border:1px solid var(--y3);
  font-size:10px;color:rgba(255,255,0,.5);line-height:1.9;display:none;
}
#install-box code{color:var(--y);background:rgba(255,255,0,.08);padding:1px 5px;}
</style>
</head>
<body>
<div class="cdeco tl"></div><div class="cdeco tr"></div>
<div class="cdeco bl"></div><div class="cdeco br"></div>
<div id="sline"></div>

<!-- HEADER -->
<div id="hdr">
  <div class="live-badge">LIVE</div>
  <div id="hdr-title">KomeKome</div>
  <button class="btn red" onclick="clearAll()">✕ 全クリア</button>
</div>

<div id="body">

  <!-- LEFT: コメントフィード -->
  <div id="feed">
    <div id="feed-hdr">
      <div class="dot" id="dot"></div>
      <span id="feed-st">STANDBY — 右パネルにURLを入力してください</span>
    </div>
    <div id="clist">
      <div id="empty">
        <div class="big">▶</div>
        <div class="sub">コメント待機中</div>
        <div class="desc">
          右パネルに YouTube の URL を入力し<br>
          モードを選択して「開始」を押してください<br><br>
          <span style="color:rgba(255,255,0,.3);">
            【ライブモード】YouTube内部API<br>
            【VODモード】YouTube Data API v3
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right">

    <!-- 入力 -->
    <div id="input-section">
      <div class="sec-lbl">// YOUTUBE 設定</div>

      <!-- モード切り替え -->
      <div id="mode-tabs">
        <div class="tab active" id="tab-live" onclick="setMode('live')">
          ▶ ライブ配信
        </div>
        <div class="tab" id="tab-vod" onclick="setMode('vod')">
          ▣ 通常動画 (VOD)
        </div>
      </div>

      <!-- URL入力 -->
      <div class="field">
        <label>YOUTUBE URL or 動画ID</label>
        <input type="text" id="url-input"
               placeholder="https://www.youtube.com/watch?v=..."
               oninput="onUrlInput()">
      </div>

      <!-- API キー (VODのみ) -->
      <div class="field" id="api-key-field">
        <label>YOUTUBE DATA API KEY (VODモードでは必須)</label>
        <input type="password" id="api-key-input"
               placeholder="AIza...">
      </div>

      <!-- エラー -->
      <div id="err-box"></div>

      <!-- ボタン -->
      <div id="ctrl-row">
        <button class="btn grn" id="btn-start" onclick="startFetch()" style="flex:1">
          ▶ 開始
        </button>
        <button class="btn red" id="btn-stop" onclick="stopFetch()" disabled>
          ■ 停止
        </button>
      </div>
    </div>

    <!-- ステータス -->
    <div id="status-section">
      <div id="status-title">// IDLE</div>
      <div id="status-bar">
        <div class="stat-chip" id="chip-mode">MODE: —</div>
        <div class="stat-chip" id="chip-vid">ID: —</div>
      </div>
    </div>

    <!-- 統計 -->
    <div id="stats">
      <div class="sbox"><div class="snum" id="s-total">0</div><div class="slbl">TOTAL</div></div>
      <div class="sbox"><div class="snum" id="s-users">0</div><div class="slbl">USERS</div></div>
      <div class="sbox"><div class="snum" id="s-rate">0</div><div class="slbl">/MIN</div></div>
    </div>

    <!-- 来場者一覧 -->
    <div id="visitors-wrap">
      <div id="visitors-hdr">
        <span>// 来場者一覧</span>
        <span id="visitors-count">0 人</span>
      </div>
      <div id="visitors-list">
        <span style="font-size:10px;color:rgba(255,255,0,.15);letter-spacing:1px;align-self:center;width:100%;text-align:center;">— まだ誰も来ていません —</span>
      </div>
    </div>

    <!-- ログ -->
    <div id="log-wrap">
      <div id="log-hdr">
        <span>// COMMENT LOG</span>
        <div style="display:flex;gap:5px">
          <button class="btn" style="padding:3px 8px;font-size:9px" onclick="fetchLog()">更新</button>
          <button class="btn red" style="padding:3px 8px;font-size:9px" onclick="clearLog()">削除</button>
        </div>
      </div>
      <textarea id="log-area" readonly placeholder="// ログはここに表示されます..."></textarea>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
  <div id="bottom-dot"></div>
  <span id="bottom-txt">IDLE — URLを入力して開始してください</span>
</div>

<script>
// ── 状態 ──────────────────────────────────────
let mode       = 'live';
let pollTimer  = null;
let knownKeys  = new Set();
let users      = new Set();
let startTime  = null;
let lastCount  = 0;

// ── モード切り替え ─────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('tab-live').className = 'tab' + (m==='live'?' active':'');
  document.getElementById('tab-vod').className  = 'tab' + (m==='vod' ?' active':'');
  document.getElementById('api-key-field').style.display = m==='vod' ? 'block' : 'none';
}

// ── URL入力 ────────────────────────────────────
function onUrlInput() {
  document.getElementById('err-box').style.display = 'none';
}

// ── 開始 ───────────────────────────────────────
async function startFetch() {
  const urlVal = document.getElementById('url-input').value.trim();
  const apiKey = document.getElementById('api-key-input').value.trim();

  if (!urlVal) { showErr('URLまたは動画IDを入力してください'); return; }

  // video_id を解析
  let videoId = urlVal;
  try {
    const r = await fetch('/parse_url', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url: urlVal})
    });
    const d = await r.json();
    if (d.video_id) videoId = d.video_id;
  } catch(e) {}

  if (mode === 'vod' && !apiKey) {
    showErr('VODモードには YouTube Data API キーが必要です');
    return;
  }

  hideErr();
  knownKeys.clear(); users.clear(); startTime = Date.now(); lastCount = 0;

  try {
    const r = await fetch('/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({video_id: videoId, api_key: apiKey, mode})
    });
    const d = await r.json();
    if (d.error) { showErr(d.error); return; }
  } catch(e) {
    showErr('サーバーエラー: ' + e.message); return;
  }

  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled  = false;
  resetFeed();
  startPoll();
}

// ── 停止 ───────────────────────────────────────
async function stopFetch() {
  await fetch('/stop', {method: 'POST'});
  stopPoll();
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled  = true;
  setBottom(false, false, 'STOPPED');
}

// ── ポーリング ─────────────────────────────────
function startPoll() {
  stopPoll();
  pollTimer = setInterval(poll, 1500);
  poll();
}
function stopPoll() { clearInterval(pollTimer); }

async function poll() {
  try {
    // ステータス確認
    const sr = await fetch('/status');
    const st = await sr.json();

    if (st.error) {
      showErr(st.error);
      setBottom(false, true, 'ERROR: ' + st.error);
      stopPoll();
      document.getElementById('btn-start').disabled = false;
      document.getElementById('btn-stop').disabled  = true;
      return;
    }

    const running = st.running;
    setBottom(running, false, running
      ? `${st.mode.toUpperCase()} 受信中 — ${st.title || st.video_id}`
      : 'IDLE');
    document.getElementById('status-title').textContent =
      st.title ? `// ${st.title}` : `// ${st.video_id || 'IDLE'}`;
    document.getElementById('chip-mode').textContent = `MODE: ${st.mode.toUpperCase()}`;
    document.getElementById('chip-vid').textContent  = `ID: ${st.video_id || '—'}`;

    if (!running && document.getElementById('btn-stop').disabled === false) {
      stopPoll();
      document.getElementById('btn-start').disabled = false;
      document.getElementById('btn-stop').disabled  = true;
    }

    // コメント取得
    const cr = await fetch('/comments');
    const cd = await cr.json();

    (cd.comments || []).slice().reverse().forEach(c => {
      const k = c.id || (c.user + '\x00' + c.comment);
      if (!knownKeys.has(k)) {
        knownKeys.add(k);
        addCard(c);
        if (!users.has(c.user)) {
          users.add(c.user);
          addVisitor(c.user);
        }
      }
    });

    // 統計更新
    document.getElementById('s-total').textContent = cd.total || 0;
    document.getElementById('s-users').textContent = users.size;
    // コメント/分
    if (startTime) {
      const mins = (Date.now() - startTime) / 60000;
      const rate = mins > 0.1 ? Math.round(users.size / mins * 10) / 10 : 0;
      document.getElementById('s-rate').textContent = rate;
    }

    if (cd.total > lastCount) {
      scanLine();
      lastCount = cd.total;
    }

  } catch(e) {
    setBottom(false, true, 'サーバー接続エラー');
  }
}

// ── 来場者追加 ─────────────────────────────────
function addVisitor(name) {
  const list = document.getElementById('visitors-list');
  // 空メッセージを除去
  const placeholder = list.querySelector('span');
  if (placeholder) placeholder.remove();

  // チップを作成
  const chip = document.createElement('div');
  chip.className = 'visitor-chip new-visitor';
  chip.title = name;
  chip.textContent = name;
  list.appendChild(chip);

  // カウント更新
  document.getElementById('visitors-count').textContent = users.size + ' 人';
}

// ── カード追加 ─────────────────────────────────
function addCard(c) {
  const list = document.getElementById('clist');
  const emp  = document.getElementById('empty');
  if (emp) emp.remove();

  const isSuper = c.type && c.type.toLowerCase().includes('superchat');
  const div = document.createElement('div');
  div.className = 'card fresh' + (isSuper ? ' superchat' : '');
  div.innerHTML =
    `<div class="card-user">${isSuper ? '💎 ' : '▶ '}${esc(c.user)}</div>` +
    `<div class="card-body">${esc(c.comment)}</div>` +
    `<div class="card-ts">${c.ts}</div>`;
  list.prepend(div);
  setTimeout(() => div.classList.remove('fresh'), 2500);
  const all = list.querySelectorAll('.card');
  if (all.length > 300) all[all.length - 1].remove();
}

// ── UI ─────────────────────────────────────────
function showErr(msg) {
  const el = document.getElementById('err-box');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}
function hideErr() {
  document.getElementById('err-box').style.display = 'none';
}
function setBottom(running, err, msg) {
  const dot = document.getElementById('bottom-dot');
  const fdot = document.getElementById('dot');
  const fst  = document.getElementById('feed-st');
  dot.className  = err ? 'err' : (running ? 'on' : '');
  fdot.className = 'dot' + (err ? ' err' : running ? ' on' : '');
  document.getElementById('bottom-txt').textContent = msg;
  fst.textContent = msg;
}
function scanLine() {
  const el = document.getElementById('sline');
  el.classList.remove('go'); void el.offsetWidth; el.classList.add('go');
}
function resetFeed() {
  document.getElementById('clist').innerHTML =
    '<div id="empty"><div class="big">▶</div><div class="sub">取得中...</div></div>';
  // 来場者リストをリセット
  document.getElementById('visitors-list').innerHTML =
    '<span style="font-size:10px;color:rgba(255,255,0,.15);letter-spacing:1px;align-self:center;width:100%;text-align:center;">— まだ誰も来ていません —</span>';
  document.getElementById('visitors-count').textContent = '0 人';
  knownKeys.clear(); users.clear();
  document.getElementById('s-total').textContent = '0';
  document.getElementById('s-users').textContent = '0';
  document.getElementById('s-rate').textContent  = '0';
}
async function fetchLog() {
  try {
    const r = await fetch('/log');
    const d = await r.json();
    const el = document.getElementById('log-area');
    el.value = d.log || '';
    el.scrollTop = el.scrollHeight;
  } catch(e) {}
}
async function clearLog() {
  if (!confirm('ログを削除しますか？')) return;
  await fetch('/log/clear', {method: 'POST'});
  document.getElementById('log-area').value = '';
  resetFeed();
}
async function clearAll() {
  if (!confirm('すべてクリアしますか？')) return;
  await stopFetch();
  await fetch('/log/clear', {method: 'POST'});
  document.getElementById('log-area').value = '';
  resetFeed();
}
function esc(s) {
  return String(s)
